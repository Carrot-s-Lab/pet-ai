<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <defs>
    <radialGradient id="hG" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FBBF7A"/>
      <stop offset="45%" stop-color="#E08A3C"/>
      <stop offset="100%" stop-color="#B86820"/>
    </radialGradient>
    <radialGradient id="bG" cx="45%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="45%" stop-color="#E08A3C"/>
      <stop offset="100%" stop-color="#B86820"/>
    </radialGradient>
    <radialGradient id="pG" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#F5B060"/>
      <stop offset="100%" stop-color="#C07828"/>
    </radialGradient>
  </defs>

  <!-- Confetti -->
  <circle cx="24" cy="54" r="5" fill="#B8ACE5"/>
  <circle cx="172" cy="42" r="4.5" fill="#E08A3C" opacity="0.8"/>
  <circle cx="186" cy="68" r="3.5" fill="#5BAD7F" opacity="0.75"/>
  <circle cx="20" cy="80" r="3" fill="#E8A020" opacity="0.65"/>
  <circle cx="178" cy="82" r="3" fill="#B8ACE5" opacity="0.7"/>
  <path d="M158 24L160 18L162 24L168 26L162 28L160 34L158 28L152 26Z" fill="#B8ACE5" opacity="0.85"/>
  <path d="M28 38L29.5 33L31 38L36 39.5L31 41L29.5 46L28 41L23 39.5Z" fill="#E08A3C" opacity="0.6"/>

  <!-- Ground shadow -->
  <ellipse cx="100" cy="215" rx="50" ry="6" fill="black" opacity="0.07"/>

  <!-- Tail -->
  <path d="M140 184 Q178 168 172 140 Q166 118 150 126" stroke="#D0802C" stroke-width="14" stroke-linecap="round" fill="none"/>

  <!-- Arms before body -->
  <path d="M59 148 Q42 158 42 174" stroke="#D0802C" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M141 148 Q158 158 158 174" stroke="#D0802C" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Body -->
  <ellipse cx="100" cy="164" rx="48" ry="50" fill="url(#bG)"/>
  <path d="M63 152 Q72 146 80 152" stroke="#B86820" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M120 152 Q129 146 138 152" stroke="#B86820" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <ellipse cx="100" cy="168" rx="22" ry="26" fill="#F5C890" opacity="0.55"/>

  <!-- Ears (before head) -->
  <path d="M72 60 L62 26 L92 54Z" fill="#C07828"/>
  <path d="M128 60 L138 26 L108 54Z" fill="#C07828"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="48" fill="url(#hG)"/>

  <!-- Ear inners -->
  <path d="M75 57 L67 32 L89 53Z" fill="#F0A068"/>
  <path d="M125 57 L133 32 L111 53Z" fill="#F0A068"/>

  <!-- Party hat — drawn on top of head -->
  <path d="M100 8 L74 64 L126 64Z" fill="#8E7FCC"/>
  <path d="M100 8 L78 60 L122 60Z" fill="#B8ACE5"/>
  <!-- Hat stripes -->
  <line x1="85" y1="44" x2="115" y2="44" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <line x1="79" y1="56" x2="121" y2="56" stroke="white" stroke-width="2" opacity="0.35"/>
  <!-- Hat pompom -->
  <circle cx="100" cy="10" r="8" fill="#DDD8F5"/>
  <circle cx="100" cy="10" r="5.5" fill="white" opacity="0.9"/>
  <!-- Hat brim -->
  <rect x="74" y="62" width="52" height="5" rx="2.5" fill="#8E7FCC" opacity="0.65"/>

  <!-- 3D highlight -->
  <ellipse cx="86" cy="70" rx="16" ry="10" fill="white" opacity="0.13" transform="rotate(-20 86 70)"/>

  <!-- Forehead stripes -->
  <path d="M88 54 Q100 50 112 54" stroke="#B86820" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M85 62 Q100 58 115 62" stroke="#B86820" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Eyes — happy wide -->
  <circle cx="84" cy="90" r="10.5" fill="#251806"/>
  <circle cx="87" cy="85" r="4" fill="white"/>
  <circle cx="116" cy="90" r="10.5" fill="#251806"/>
  <circle cx="119" cy="85" r="4" fill="white"/>

  <!-- Cheek blush — stronger (birthday excitement) -->
  <ellipse cx="73" cy="103" rx="9" ry="5.5" fill="#D96058" opacity="0.22"/>
  <ellipse cx="127" cy="103" rx="9" ry="5.5" fill="#D96058" opacity="0.22"/>

  <!-- Nose -->
  <ellipse cx="100" cy="104" rx="4" ry="3.5" fill="#D96058"/>
  <!-- Big smile -->
  <path d="M100 107.5 L100 111" stroke="#C05040" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M91 112 Q100 121 109 112" stroke="#C05040" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Whiskers -->
  <line x1="52" y1="102" x2="88" y2="105" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="52" y1="111" x2="88" y2="110" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="148" y1="102" x2="112" y2="105" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="148" y1="111" x2="112" y2="110" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
</svg>
