  <!-- Forehead stripes -->
  <path d="M88 50 Q100 46 112 50" stroke="#B86820" stroke-width="2.2" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M85 58 Q100 54 115 58" stroke="#B86820" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Eyes — extra wide + double highlight dots -->
  <circle cx="84" cy="86" r="11.5" fill="#251806"/>
  <circle cx="87" cy="80" r="4.5" fill="white"/>
  <circle cx="83" cy="89" r="2" fill="white" opacity="0.45"/>
  <circle cx="116" cy="86" r="11.5" fill="#251806"/>
  <circle cx="119" cy="80" r="4.5" fill="white"/>
  <circle cx="115" cy="89" r="2" fill="white" opacity="0.45"/>

