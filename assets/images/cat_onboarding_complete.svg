  <path d="M60 144 Q40 120 42 100" stroke="#D0802C" stroke-width="13" stroke-linecap="round" fill="none"/>
  <path d="M140 144 Q160 120 158 100" stroke="#D0802C" stroke-width="13" stroke-linecap="round" fill="none"/>

  <!-- Body (slightly raised — jumping feel) -->
  <ellipse cx="100" cy="160" rx="48" ry="50" fill="url(#bG)"/>
  <path d="M63 148 Q72 142 80 148" stroke="#B86820" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M120 148 Q129 142 138 148" stroke="#B86820" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <ellipse cx="100" cy="164" rx="22" ry="26" fill="#F5C890" opacity="0.55"/>

  <!-- Left paw -->
  <ellipse cx="42" cy="96" rx="11" ry="10" fill="url(#pG)"/>
  <ellipse cx="35" cy="89" rx="7" ry="6.5" fill="url(#pG)"/>
  <ellipse cx="42" cy="85" rx="7" ry="6.5" fill="url(#pG)"/>
  <ellipse cx="49" cy="89" rx="7" ry="6.5" fill="url(#pG)"/>

  <!-- Right paw -->
  <ellipse cx="158" cy="96" rx="11" ry="10" fill="url(#pG)"/>
  <ellipse cx="151" cy="89" rx="7" ry="6.5" fill="url(#pG)"/>
  <ellipse cx="158" cy="85" rx="7" ry="6.5" fill="url(#pG)"/>
  <ellipse cx="165" cy="89" rx="7" ry="6.5" fill="url(#pG)"/>

