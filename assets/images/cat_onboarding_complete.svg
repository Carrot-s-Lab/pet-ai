  <!-- Big open celebration smile -->
  <path d="M100 103.5 L100 107" stroke="#C05040" stroke-width="1.6" stroke-linecap="round" fill="none"/>
  <path d="M90 108 Q100 119 110 108" stroke="#C05040" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Whiskers -->
  <line x1="52" y1="98" x2="88" y2="101" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="52" y1="107" x2="88" y2="106" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="148" y1="98" x2="112" y2="101" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
  <line x1="148" y1="107" x2="112" y2="106" stroke="#E0C090" stroke-width="1.1" opacity="0.65"/>
</svg>
