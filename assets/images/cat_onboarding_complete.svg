  <circle cx="178" cy="34" r="4.5" fill="#5BAD7F" opacity="0.8"/>
  <rect x="158" y="48" width="8" height="8" rx="2" fill="#B8ACE5" opacity="0.9" transform="rotate(-25 162 52)"/>
  <path d="M163 20L165 14L167 20L173 22L167 24L165 30L163 24L157 22Z" fill="#E08A3C" opacity="0.9"/>
  <path d="M20 62L22 56L24 62L30 64L24 66L22 72L20 66L14 64Z" fill="#B8ACE5" opacity="0.75"/>
  <circle cx="34" cy="84" r="3.5" fill="#E8A020" opacity="0.7"/>
  <circle cx="170" cy="80" r="3" fill="#E08A3C" opacity="0.6"/>
  <circle cx="186" cy="58" r="4.5" fill="#DDD8F5"/>
  <rect x="11" y="76" width="7" height="7" rx="1.5" fill="#B8ACE5" opacity="0.65" transform="rotate(45 14 79)"/>
