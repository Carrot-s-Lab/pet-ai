  <path d="M72 56 L62 22 L92 50Z" fill="#C07828"/>
  <path d="M128 56 L138 22 L108 50Z" fill="#C07828"/>

  <!-- Head (slightly raised) -->
  <circle cx="100" cy="86" r="48" fill="url(#hG)"/>

  <!-- Ear inners -->
  <path d="M75 53 L67 28 L89 49Z" fill="#F0A068"/>
  <path d="M125 53 L133 28 L111 49Z" fill="#F0A068"/>

  <!-- 3D highlight -->
