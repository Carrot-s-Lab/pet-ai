name: pet_ai_project
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  localizely_sdk: ^2.7.5
  cupertino_icons: ^1.0.9
  intl_utils: ^2.8.14
  intl: ^0.20.2
  dio: ^5.9.2
  flutter_dotenv: ^6.0.1
  get_it: ^9.2.1
  url_launcher: ^6.3.2
  provider: ^6.1.5
  flutter_svg: ^2.3.0
  path_provider: ^2.1.4
  flutter_animated_dialog_updated: ^1.0.0
  awesome_dio_interceptor: ^1.2.0
  go_router: ^17.2.3
  flutter_local_notifications: ^21.0.0
  gap: ^3.0.1
  automatic_animated_list: ^1.1.0
  clipboard: ^3.0.14
  loading_indicator: ^3.1.0
  google_fonts: ^8.1.0
  substring_highlight: ^1.0.33
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.5
  app_tracking_transparency: ^2.0.6+1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2
  firebase_ai: ^3.12.1
  firebase_storage: ^13.4.1
  video_player: ^2.11.1
  collection: ^1.19.1
  adaptive_platform_ui: ^0.1.107
  flutter_markdown_plus: ^1.0.3
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter_intl:
  enabled: true
  class_name: Tr
  main_locale: en
  localizely:
    ota_enabled: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/videos/
    - assets/images/
    - assets/fonts/
    - env/.env

  fonts:
    - family: Kenfolg
      fonts:
        - asset: assets/fonts/Kenfolg.otf
