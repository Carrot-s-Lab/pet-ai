name: pet_ai_project
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  localizely_sdk: ^2.5.8
  cupertino_icons: ^1.0.8
  intl_utils: ^2.8.5
  intl: ^0.20.2
  dio: ^5.7.0
  flutter_dotenv: ^5.2.1
  get_it: ^8.0.0
  url_launcher: ^6.3.1
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  path_provider: ^2.1.4
  flutter_animated_dialog_updated: ^1.0.0
  awesome_dio_interceptor: ^1.2.0
  go_router: ^14.3.0
  flutter_local_notifications: ^18.0.1
  gap: ^3.0.1
  automatic_animated_list: ^1.1.0
  clipboard: ^0.1.3
  loading_indicator: ^3.1.0
  google_fonts: ^4.0.4
  substring_highlight: ^1.0.33
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.2
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_intl:
  enabled: true
  class_name: Tr
  main_locale: en
  localizely:
    ota_enabled: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - env/.env
